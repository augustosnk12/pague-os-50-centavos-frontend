<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <title>Pague os 50 centavos — Controle de crédito pessoal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app/theme.css?v=12" />
  <style>
    /* responsive chrome */
    .lt-desktop-nav { display: none; }
    .lt-desktop-only { display: none; }
    @media (min-width: 880px) {
      .lt-desktop-nav { display: flex !important; }
      .lt-desktop-only { display: inline-flex !important; }
      .lt-fab { display: none !important; }
      .lt-bottom-tabs { display: none !important; }
      .lt-hamburger { display: none !important; }
    }
    .lt-row-hover:hover { transform: translateY(-2px); box-shadow: var(--shadow-md) !important; border-color: var(--border-strong) !important; }
    /* desktop: centered dialog instead of bottom sheet */
    @media (min-width: 560px) {
      .lt-sheet-wrap { align-items: center !important; }
      .lt-sheet { border-radius: calc(var(--radius) * 1.1) !important; }
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: var(--cal-filter, none); cursor: pointer; opacity: 0.6; }
    [data-theme="dark"] input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    a { text-decoration: none; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

</head>
